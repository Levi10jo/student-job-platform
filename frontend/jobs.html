<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs finden – StudyWork</title>
  <meta name="description" content="Durchsuche aktuelle Studentenjobs auf StudyWork und filtere nach Stichwort, Ort und Anstellungsart." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23ffc94d'/%3E%3Cg fill='none' stroke='%2320302a' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='5' y='8.5' width='14' height='10' rx='1.5'/%3E%3Cpath d='M9.5 8.5V7a1.5 1.5 0 0 1 1.5-1.5h2A1.5 1.5 0 0 1 14.5 7v1.5'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('sw-theme') || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');</script>
</head>
<body data-page="jobs">
  <header class="site-header" id="site-header"></header>

  <main>
    <div class="container">
      <div class="page-head">
        <h1>Jobs finden</h1>
        <p>Entdecke aktuelle Studentenjobs und filtere nach deinen Wünschen.</p>
      </div>

      <form class="filter-bar" id="filter-form" role="search" aria-label="Jobs filtern">
        <div>
          <label class="visually-hidden" for="f-title">Stichwort</label>
          <input class="input" type="search" id="f-title" name="title" placeholder="Stichwort, z. B. Marketing" />
        </div>
        <div>
          <label class="visually-hidden" for="f-location">Ort</label>
          <input class="input" type="search" id="f-location" name="location" placeholder="Ort, z. B. Berlin" />
        </div>
        <div>
          <label class="visually-hidden" for="f-type">Anstellungsart</label>
          <select class="select" id="f-type" name="job_type">
            <option value="">Alle Anstellungsarten</option>
            <option value="Werkstudent">Werkstudent</option>
            <option value="Praktikum">Praktikum</option>
            <option value="Teilzeit">Teilzeit</option>
            <option value="Vollzeit">Vollzeit</option>
            <option value="Minijob">Minijob</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Suchen
        </button>
      </form>

      <div class="row-between" style="margin-bottom:14px;">
        <p class="text-muted mb-0" id="result-count" aria-live="polite"></p>
        <div class="result-tools">
          <button class="btn btn-ghost btn-sm" id="reset-filters" type="button" hidden>Filter zurücksetzen</button>
          <button class="btn btn-secondary btn-sm" id="remote-filter" type="button" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Nur Remote
          </button>
          <button class="btn btn-secondary btn-sm" id="job-alert-btn" type="button" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Job-Alert
          </button>
          <button class="btn btn-secondary btn-sm" id="fav-filter" type="button" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21.2l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
            Merkliste (<span id="fav-count">0</span>)
          </button>
          <label class="visually-hidden" for="sort-select">Ergebnisse sortieren</label>
          <select class="select select-inline" id="sort-select">
            <option value="neu">Neueste zuerst</option>
            <option value="alt">Älteste zuerst</option>
            <option value="titel">Titel A–Z</option>
          </select>
        </div>
      </div>

      <div class="grid grid-jobs" id="jobs-grid"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/api.js" defer></script>
  <script src="js/jobs.js" defer></script>
</body>
</html>
