<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmelden – StudyWork</title>
  <meta name="description" content="Melde dich bei StudyWork an – als Student oder Unternehmen." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23ffc94d'/%3E%3Cg fill='none' stroke='%2320302a' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='5' y='8.5' width='14' height='10' rx='1.5'/%3E%3Cpath d='M9.5 8.5V7a1.5 1.5 0 0 1 1.5-1.5h2A1.5 1.5 0 0 1 14.5 7v1.5'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('sw-theme') || (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');</script>
</head>
<body data-page="login">
  <header class="site-header" id="site-header"></header>

  <main>
    <div class="container">
      <div class="auth-wrap">
        <div class="card card-pad auth-card">
          <div class="page-head" style="margin-bottom:22px;">
            <h1>Anmelden</h1>
            <p>Willkommen zurück! Melde dich mit deinem Konto an.</p>
          </div>

          <form id="login-form" novalidate>
            <fieldset class="role-toggle" id="role-toggle">
              <legend class="visually-hidden">Ich melde mich an als</legend>
              <label class="role-option">
                <input type="radio" name="role" value="student" checked />
                <span class="role-card">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.7 2.7 3 6 3s6-1.3 6-3v-5"/></svg>
                  Student
                </span>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="company" />
                <span class="role-card">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                  Unternehmen
                </span>
              </label>
            </fieldset>

            <div class="form-group">
              <label for="login-email">E-Mail <span class="required" aria-hidden="true">*</span></label>
              <input class="input" type="email" id="login-email" name="email" autocomplete="email" maxlength="100" required autofocus />
              <span class="field-error" id="err-email"></span>
            </div>
            <div class="form-group">
              <label for="login-password">Passwort <span class="required" aria-hidden="true">*</span></label>
              <div class="pw-wrap">
                <input class="input" type="password" id="login-password" name="password" autocomplete="current-password" maxlength="100" required />
                <button class="pw-toggle" type="button" aria-pressed="false" aria-label="Passwort anzeigen">
                  <svg class="ic-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="ic-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
                </button>
              </div>
              <span class="field-error" id="err-password"></span>
            </div>

            <button class="btn btn-primary btn-block" type="submit" id="login-submit">Anmelden</button>
          </form>

          <p class="auth-switch">Noch kein Konto? <a href="register.html">Jetzt registrieren</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
</body>
</html>
