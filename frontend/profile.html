<body data-page="profile">
  <header class="site-header" id="site-header"></header>

  <main>
    <div class="container">
      <!-- Dynamischer Inhalt: Bearbeiten (eigenes Profil) oder Ansicht (Unternehmen) -->
      <div id="profile-root" aria-live="polite"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <footer class="site-footer" id="site-footer"></footer>

  <!-- Modal: Löschen bestätigen -->
  <div class="modal-backdrop" id="delete-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
      <div class="modal-head">
        <h2 id="delete-modal-title">Löschen bestätigen</h2>
        <button class="icon-btn" type="button" data-close aria-label="Dialog schließen">✕</button>
      </div>

      <div class="modal-body">
        <p id="delete-modal-text"></p>
      </div>

      <div class="modal-foot">
        <button class="btn btn-secondary" type="button" data-close>Abbrechen</button>
        <button class="btn btn-danger" type="button" id="delete-confirm-btn">Endgültig löschen</button>
      </div>
    </div>
  </div>

<script src="js/api.js" defer></script>
<script src="js/profile.js" defer></script>
